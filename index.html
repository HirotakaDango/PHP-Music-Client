<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>PHPMusic Playground</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PHPMusic">
    <meta property="og:title" content="PHPMusic Playground">
    <meta property="og:description" content="A lightweight client-side music player interface.">
    <meta property="og:type" content="music.playlist">
    <meta property="og:image" content="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d0bcff'><path d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d0bcff'><path d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/></svg>">
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22short_name%22%3A%22PHPMusic%22%2C%22name%22%3A%22PHPMusic%20Playground%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Butf8%2C%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27%23d0bcff%27%3E%3Cpath%20d%3D%27M12%203v10.55c-.59-.34-1.27-.55-2-.55-2.21%200-4%201.79-4%204s1.79%204%204%204%204-1.79%204-4V7h4V3h-6z%27%2F%3E%3C%2Fsvg%3E%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22sizes%22%3A%22192x192%20512x512%22%7D%5D%2C%22start_url%22%3A%22.%2F%22%2C%22background_color%22%3A%22%23121212%22%2C%22theme_color%22%3A%22%23121212%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%7D">
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #121212;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        height: 100%;
        height: 100dvh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }
      #pm-header {
        background: #000;
        padding: 15px 15px 15px 15px;
        padding-top: calc(12px + env(safe-area-inset-top));
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex: 0 0 auto;
        user-select: none;
      }
      #pm-player-container {
        background: #000;
        padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px;
        border-top: 1px solid #222;
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <div id="pm-header">
      <strong style="font-size: 16px; margin: 0; color: #fff;">PHPMusic</strong>
      <div style="display: flex; align-items: center;">
        <span id="pm-gear" style="cursor: pointer; display: flex; align-items: center; color: #ccc; padding: 4px;" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
        </span>
      </div>
    </div>
    <div style="flex: 1 1 auto; position: relative; display: flex; flex-direction: column; background: #121212; overflow: hidden; min-height: 0;">
      <div id="pm-drawer" style="position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: #1c1b1f; transition: left 0.3s; z-index: 10; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 12px; color: #fff;">
          <strong style="margin: 0; font-size: 15px;">Settings</strong>
          <span id="pm-drawer-close" style="cursor: pointer; font-size: 26px; line-height: 1;">&times;</span>
        </div>
        <input id="pm-url" style="box-sizing: border-box; width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 13px; outline: none;" placeholder="API URL">
        <input id="pm-key" type="password" style="box-sizing: border-box; width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 13px; outline: none;" placeholder="API Key">
        <div style="display: flex; gap: 10px;">
          <select id="pm-type" style="box-sizing: border-box; width: 40%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 13px; outline: none;">
            <option value="all">All</option>
            <option value="playlist">Playlist</option>
            <option value="artist">Artist</option>
          </select>
          <input id="pm-feed-id" style="box-sizing: border-box; width: 60%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 13px; outline: none;" placeholder="Feed ID">
        </div>
        <button id="pm-connect" style="width: 100%; padding: 12px; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; font-size: 14px;">Connect</button>
      </div>
      <div id="pm-list" style="overflow-y: auto; flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0;"></div>
    </div>
    <div id="pm-player-container">
      <div id="pm-track-title" style="font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; text-align: center;">Not playing</div>
      <div id="pm-progress-container" style="height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; margin-top: 6px;">
        <div id="pm-progress" style="height: 100%; width: 0%; background: #d0bcff; border-radius: 3px; pointer-events: none; transition: width 0.1s linear;"></div>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 2px;">
        <span id="pm-time-current">0:00</span>
        <span id="pm-time-total">0:00</span>
      </div>
      <div style="display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 2px;">
        <button id="pm-prev" style="background: none; border: none; color: #fff; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button id="pm-play" style="background: #d0bcff; border: none; color: #000; cursor: pointer; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
          <div id="icon-play" style="display: flex;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
          <div id="icon-pause" style="display: none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </div>
        </button>
        <button id="pm-next" style="background: none; border: none; color: #fff; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>
    </div>
    <script>
      (function() {
        const $ = id => document.getElementById(id),
        gearBtn = $("pm-gear"),
        drawer = $("pm-drawer"),
        drawerClose = $("pm-drawer-close"),
        urlInput = $("pm-url"),
        keyInput = $("pm-key"),
        typeSelect = $("pm-type"),
        feedIdInput = $("pm-feed-id"),
        connectBtn = $("pm-connect"),
        list = $("pm-list"),
        trackTitle = $("pm-track-title"),
        timeCurrent = $("pm-time-current"),
        timeTotal = $("pm-time-total"),
        progressContainer = $("pm-progress-container"),
        progressBar = $("pm-progress"),
        prevBtn = $("pm-prev"),
        playBtn = $("pm-play"),
        nextBtn = $("pm-next"),
        iconPlay = $("icon-play"),
        iconPause = $("icon-pause");

        if (!window.pmAudio) window.pmAudio = new Audio();
        const audio = window.pmAudio;
        let songQueue = [],
        currentIndex = -1,
        page = 1,
        isFetching = false,
        hasMore = true;

        const getStore = k => {
          try {
            return localStorage.getItem(k) || "";
          } catch (e) {
            return "";
          }
        };
        const setStore = (k, v) => {
          try {
            localStorage.setItem(k, v);
          } catch (e) {}
        };

        urlInput.value = getStore("pm_url");
        keyInput.value = getStore("pm_key");
        typeSelect.value = getStore("pm_type") || "all";
        feedIdInput.value = getStore("pm_feed_id");

        function saveConfig() {
          setStore("pm_url", urlInput.value.trim());
          setStore("pm_key", keyInput.value.trim());
          setStore("pm_type", typeSelect.value);
          setStore("pm_feed_id", feedIdInput.value.trim());
        }

        const formatTime = s => {
          if (isNaN(s) || s < 0) return "0:00";
          const m = Math.floor(s / 60),
                r = Math.floor(s - m * 60).toString().padStart(2, "0");
          return m + ":" + r;
        };

        const escapeHtml = t => t ? t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : "";

        function getApiUrl(pageNo) {
          let baseUrl = urlInput.value.trim().replace(/\/$/, "");
          if (!baseUrl.includes("access=api")) {
            baseUrl += (baseUrl.includes("?") ? "&" : "/?") + "access=api";
          }
          const key = keyInput.value.trim(),
                type = typeSelect.value,
                id = feedIdInput.value.trim();
          let act = "get_songs&sort=id_desc";
          if (type === "playlist") {
            act = "get_playlist_songs&public_id=" + encodeURIComponent(id) + "&sort=manual_order";
          } else if (type === "artist") {
            act = /^[0-9]+$/.test(id) ? "get_songs&filter_user_id=" + id + "&share_type=artist&id=" + id : "get_songs&artist=" + encodeURIComponent(id);
          }
          return baseUrl + "&action=" + act + "&page=" + pageNo + "&api_key=" + encodeURIComponent(key);
        }

        async function loadSongs(isLoadMore = false) {
          if (isFetching || (!hasMore && isLoadMore)) return;
          isFetching = true;
          if (isLoadMore) {
            page++;
          } else {
            page = 1;
            songQueue = [];
            list.innerHTML = "";
            hasMore = true;
          }
          let loader = null;
          if (isLoadMore) {
            loader = document.createElement("div");
            loader.style.cssText = "text-align:center;color:#888;padding:12px;font-size:12px;";
            loader.textContent = "Loading...";
            list.appendChild(loader);
          } else {
            list.innerHTML = '<div style="text-align:center;color:#888;padding:20px;font-size:13px;">Connecting...</div>';
          }
          try {
            const res = await fetch(getApiUrl(page));
            if (res.status === 401) {
              isFetching = false;
              if (loader) loader.remove();
              return alert("Unauthorized API credentials.");
            }
            const songs = await res.json();
            if (loader) loader.remove();
            if (!isLoadMore && page === 1) list.innerHTML = "";
            if (songs && songs.length > 0) {
              const start = songQueue.length;
              songQueue = songQueue.concat(songs);
              songs.forEach((song, i) => {
                const idx = start + i,
                      div = document.createElement("div");
                div.id = "track-" + idx;
                div.style.cssText = "display:flex;flex-direction:column;padding:10px 15px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.2s;box-sizing:border-box;flex-shrink:0;";
                div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;pointer-events:none;gap:10px;"><strong style="font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-grow:1;">${escapeHtml(song.title)}</strong><span style="font-size:12px;color:#999;flex-shrink:0;">${formatTime(song.duration)}</span></div><div style="font-size:12px;color:#888;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;">${escapeHtml(song.artist)}</div>`;
                div.onmouseover = function() {
                  if (currentIndex !== idx) this.style.background = "rgba(255,255,255,0.05)";
                };
                div.onmouseout = function() {
                  if (currentIndex !== idx) this.style.background = "transparent";
                };
                div.onclick = () => playSong(idx);
                list.appendChild(div);
              });
              if (songs.length < 25) hasMore = false;
            } else {
              hasMore = false;
              if (!isLoadMore) list.innerHTML = '<div style="text-align:center;color:#888;padding:20px;font-size:13px;">No tracks found.</div>';
            }
          } catch (err) {
            if (loader) loader.remove();
            if (!isLoadMore) list.innerHTML = '<div style="text-align:center;color:#dc3545;padding:20px;font-size:13px;">API Connection Error</div>';
            hasMore = false;
          }
          isFetching = false;
        }

        async function playSong(idx) {
          if (idx < 0 || idx >= songQueue.length) return;
          currentIndex = idx;
          const song = songQueue[idx];
          trackTitle.textContent = song.title || "Unknown";
          list.querySelectorAll("div[id^='track-']").forEach(el => {
            el.style.background = "transparent";
            el.style.borderLeft = "none";
          });
          const activeEl = $("track-" + idx);
          if (activeEl) {
            activeEl.style.background = "rgba(255,255,255,0.08)";
            activeEl.style.borderLeft = "4px solid #d0bcff";
            activeEl.scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
          let baseUrl = urlInput.value.trim().replace(/\/$/, "");
          if (!baseUrl.includes("access=api")) {
            baseUrl += (baseUrl.includes("?") ? "&" : "/?") + "access=api";
          }
          const streamUrl = baseUrl + "&action=get_stream&id=" + song.id + "&api_key=" + encodeURIComponent(keyInput.value.trim());
          audio.src = streamUrl;
          audio.play().catch(e => console.error("Playback error:", e));
        }

        function togglePlay() {
          if (audio.src) {
            if (audio.paused) audio.play();
            else audio.pause();
          } else if (songQueue.length > 0) {
            playSong(0);
          }
        }

        audio.onplay = () => {
          iconPlay.style.display = "none";
          iconPause.style.display = "block";
        };
        audio.onpause = () => {
          iconPlay.style.display = "block";
          iconPause.style.display = "none";
        };
        audio.onended = () => {
          if (currentIndex + 1 < songQueue.length) playSong(currentIndex + 1);
        };
        audio.onloadedmetadata = () => {
          const dur = audio.duration;
          if (isFinite(dur)) {
            timeTotal.textContent = formatTime(dur);
          }
        };
        audio.ontimeupdate = () => {
          const cur = audio.currentTime,
                dur = audio.duration;
          if (isFinite(dur) && dur > 0) {
            progressBar.style.width = (cur / dur * 100) + "%";
            timeCurrent.textContent = formatTime(cur);
            timeTotal.textContent = formatTime(dur);
          }
        };
        progressContainer.onclick = e => {
          if (!isFinite(audio.duration)) return;
          const rect = progressContainer.getBoundingClientRect();
          audio.currentTime = (e.clientX - rect.left) / rect.width * audio.duration;
        };
        list.addEventListener("scroll", () => {
          if (list.scrollTop + list.clientHeight >= list.scrollHeight - 35) loadSongs(true);
        });
        prevBtn.onclick = () => {
          if (currentIndex > 0) playSong(currentIndex - 1);
        };
        nextBtn.onclick = () => {
          if (currentIndex + 1 < songQueue.length) playSong(currentIndex + 1);
        };
        playBtn.onclick = togglePlay;
        gearBtn.onclick = () => drawer.style.left = "0";
        drawerClose.onclick = () => drawer.style.left = "-100%";
        connectBtn.onclick = () => {
          saveConfig();
          drawer.style.left = "-100%";
          loadSongs(false);
        };
        if (urlInput.value && keyInput.value) loadSongs(false);

        if ('serviceWorker' in navigator) {
          const swCode = `
            const CACHE_NAME = 'PHPMusic-cache-v1';
            const ASSETS = [
              './',
              './index.html'
            ];

            self.addEventListener('install', (e) => {
              e.waitUntil(
                caches.open(CACHE_NAME).then((cache) => {
                  return cache.addAll(ASSETS).catch(() => {});
                }).then(() => self.skipWaiting())
              );
            });

            self.addEventListener('activate', (e) => {
              e.waitUntil(
                caches.keys().then((keys) => {
                  return Promise.all(
                    keys.map((key) => {
                      if (key !== CACHE_NAME) {
                        return caches.delete(key);
                      }
                    })
                  );
                }).then(() => self.clients.claim())
              );
            });

            self.addEventListener('fetch', (e) => {
              const url = new URL(e.request.url);
              if (url.search.includes('api_key=')) {
                return;
              }
              e.respondWith(
                fetch(e.request)
                  .then((res) => {
                    if (res && res.status === 200) {
                      const clone = res.clone();
                      caches.open(CACHE_NAME).then((cache) => {
                        cache.put(e.request, clone);
                      });
                    }
                    return res;
                  })
                  .catch(() => {
                    return caches.match(e.request).then((cachedRes) => {
                      if (cachedRes) return cachedRes;
                      if (e.request.mode === 'navigate') {
                        return caches.match('./') || caches.match('./index.html');
                      }
                    });
                  })
              );
            });
          `;
          const blob = new Blob([swCode], { type: 'application/javascript' });
          const swUrl = URL.createObjectURL(blob);
          navigator.serviceWorker.register(swUrl).catch(() => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
          });
        }
      })();
    </script>
  </body>
</html>
